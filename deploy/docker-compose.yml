name: vehicle-identity-demo

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vidpass}
      POSTGRES_DB: vid
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vid}"]
      interval: 3s
      timeout: 3s
      retries: 20

  identity-service:
    build:
      context: ..
      dockerfile: deploy/go-service.Dockerfile
      args:
        SERVICE: identity-service
    environment:
      PORT: "8081"
      POSTGRES_USER: ${POSTGRES_USER:-vid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vidpass}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      IDENTITY_DB: identity
      JWT_ISSUER: ${JWT_ISSUER:-vehicle-demo.identity-service}
      AUDIT_URL: http://audit-service:8083
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-Vehicle Identity Demo}
      WEBAUTHN_RP_ORIGINS: ${WEBAUTHN_RP_ORIGINS:-http://localhost:5173}
      WEB_ORIGINS: http://localhost:5173,http://localhost:5174
      VEHICLE_SERVICE_CLIENT_ID: ${VEHICLE_SERVICE_CLIENT_ID:-vehicle-service}
      VEHICLE_SERVICE_CLIENT_SECRET: ${VEHICLE_SERVICE_CLIENT_SECRET:-vehicle-service-secret}
      FACTORY_CLIENT_ID: ${FACTORY_CLIENT_ID:-vehicle-factory}
      FACTORY_CLIENT_SECRET: ${FACTORY_CLIENT_SECRET:-vehicle-factory-secret}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  vehicle-service:
    build:
      context: ..
      dockerfile: deploy/go-service.Dockerfile
      args:
        SERVICE: vehicle-service
    environment:
      PORT: "8082"
      POSTGRES_USER: ${POSTGRES_USER:-vid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vidpass}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      VEHICLE_DB: vehicle
      JWT_ISSUER: ${JWT_ISSUER:-vehicle-demo.identity-service}
      IDENTITY_URL: http://identity-service:8081
      AUDIT_URL: http://audit-service:8083
      WEB_ORIGINS: http://localhost:5173,http://localhost:5174
      VEHICLE_SERVICE_CLIENT_ID: ${VEHICLE_SERVICE_CLIENT_ID:-vehicle-service}
      VEHICLE_SERVICE_CLIENT_SECRET: ${VEHICLE_SERVICE_CLIENT_SECRET:-vehicle-service-secret}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_started

  audit-service:
    build:
      context: ..
      dockerfile: deploy/go-service.Dockerfile
      args:
        SERVICE: audit-service
    environment:
      PORT: "8083"
      POSTGRES_USER: ${POSTGRES_USER:-vid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vidpass}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      AUDIT_DB: audit
      JWT_ISSUER: ${JWT_ISSUER:-vehicle-demo.identity-service}
      IDENTITY_URL: http://identity-service:8081
      WEB_ORIGINS: http://localhost:5173,http://localhost:5174
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_started

  simulated-vehicle:
    build:
      context: ..
      dockerfile: deploy/go-service.Dockerfile
      args:
        SERVICE: simulated-vehicle
    environment:
      PORT: "8084"
      IDENTITY_URL: http://identity-service:8081
      VEHICLE_URL: http://vehicle-service:8082
      FACTORY_CLIENT_ID: ${FACTORY_CLIENT_ID:-vehicle-factory}
      FACTORY_CLIENT_SECRET: ${FACTORY_CLIENT_SECRET:-vehicle-factory-secret}
      NEW_VEHICLE_DISCOVERY_INTERVAL: 8s
    ports:
      - "8084:8084"
    depends_on:
      identity-service:
        condition: service_started
      vehicle-service:
        condition: service_started

  consumer-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        APP: consumer-web
    environment:
      VITE_IDENTITY_URL: http://localhost:8081
      VITE_VEHICLE_URL: http://localhost:8082
    ports:
      - "5173:5173"
    depends_on:
      - identity-service
      - vehicle-service

  staff-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        APP: staff-web
    environment:
      VITE_VEHICLE_URL: http://localhost:8082
      VITE_AUDIT_URL: http://localhost:8083
    ports:
      - "5174:5174"
    depends_on:
      - vehicle-service
      - audit-service

volumes:
  pgdata:
