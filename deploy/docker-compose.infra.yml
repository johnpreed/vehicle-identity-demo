# Infra-only stack for local debugging: everything EXCEPT the four Go services.
# Run this, then launch the Go services on the host from VS Code (.vscode/launch.json)
# so you can set breakpoints. It shares the same project name (and therefore the same
# `pgdata` volume and network) as deploy/docker-compose.yml.
#
#   docker compose -f deploy/docker-compose.infra.yml up -d
#
# The web apps reach the host-run Go services through the browser via the published
# localhost ports (VITE_* below), so no extra wiring is needed.
name: vehicle-identity-demo

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vidpass}
      POSTGRES_DB: vid
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vid}"]
      interval: 3s
      timeout: 3s
      retries: 20

  consumer-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        APP: consumer-web
    environment:
      VITE_IDENTITY_URL: http://localhost:8081
      VITE_VEHICLE_URL: http://localhost:8082
    ports:
      - "5173:5173"

  staff-web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        APP: staff-web
    environment:
      VITE_VEHICLE_URL: http://localhost:8082
      VITE_AUDIT_URL: http://localhost:8083
    ports:
      - "5174:5174"

volumes:
  pgdata:
